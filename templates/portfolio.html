{% extends "base.html" %}
{% block content %}

<div class="container-fluid py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold">Portfolio Builder</h2>
            <p class="text-muted">
                Create your professional portfolio website
            </p>
        </div>

        <button id="exportPortfolioBtn" class="btn btn-success">
            Export Portfolio PDF
        </button>
        

    </div>
<div class="mt-2">

    <button id="updatePortfolioBtn" class="btn btn-primary btn-sm px-3 me-2">
        Update Preview
    </button>

    <button id="savePortfolioBtn" class="btn btn-success btn-sm px-3">
        Save Portfolio
    </button>

</div>

</div>

<input type="hidden" id="portfolioId" value="{{ portfolio.id if portfolio else '' }}">

    <div class="row">

        <!-- ========================= -->
        <!-- BUILDER PANEL -->
        <!-- ========================= -->

        <div class="col-lg-4">

            <div class="card shadow-sm border-0 p-4">

                <h5 class="mb-3">Personal Information</h5>

                <input
                    type="text"
                    id="fullName"
                    class="form-control mb-3"
                    placeholder="Full Name">

                <input
                    type="text"
                    id="title"
                    class="form-control mb-3"
                    placeholder="Professional Title">

                <textarea
                    id="about"
                    class="form-control mb-3"
                    rows="4"
                    placeholder="About Yourself"></textarea>

                <input
                    type="text"
                    id="skills"
                    class="form-control mb-3"
                    placeholder="Python, Flask, AI, MySQL">

                <input
                    type="text"
                    id="githubInput"
                    class="form-control mb-3"
                    placeholder="GitHub URL">

                <input
                    type="text"
                    id="linkedinInput"
                    class="form-control mb-3"
                    placeholder="LinkedIn URL">

               <input
                    type="text"
                    id="email"
                    class="form-control mb-3"
                    placeholder="Email Address">

                <hr>

                <h5 class="mb-3">Project</h5>

                <input
                    type="text"
                    id="projectTitle"
                    class="form-control mb-2"
                    placeholder="Project Title">

                <textarea
                    id="projectDescription"
                    class="form-control mb-3"
                    rows="3"
                    placeholder="Project Description"></textarea>

                <h5 class="mb-3">Experience</h5>

                <input
                    type="text"
                    id="experienceTitle"
                    class="form-control mb-2"
                    placeholder="Experience Title">

                <textarea
                    id="experienceDescription"
                    class="form-control mb-3"
                    rows="3"
                    placeholder="Experience Description"></textarea>

                <h5 class="mb-3">Education</h5>

                <input
                    type="text"
                    id="degree"
                    class="form-control mb-2"
                    placeholder="Degree">

                <input
                    type="text"
                    id="college"
                    class="form-control mb-3"
                    placeholder="College / University">

                <h5 class="mb-3">Contact Details</h5>

                <input
                    type="text"
                    id="phone"
                    class="form-control mb-2"
                    placeholder="Phone Number">

                <input
                    type="text"
                    id="location"
                    class="form-control mb-3"
                    placeholder="Location">


            </div>

        </div>

        <!-- ========================= -->
        <!-- PORTFOLIO PREVIEW -->
        <!-- ========================= -->


            <div class="col-lg-8">

                <div class="portfolio-preview">

                    <!-- HERO -->

                    <section class="hero-section text-center">

                        <img
                            src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                            class="profile-image">

                        <h1 id="previewName"></h1>

                        <h4 id="previewTitle"></h4>

                        <p id="previewAbout"></p>

                        <div class="mt-3">

                            <a href="#"
                            id="githubBtn"
                            class="btn btn-dark me-2 d-none">
                                GitHub
                            </a>

                            <a href="#"
                            id="linkedinBtn"
                            class="btn btn-primary d-none">
                                LinkedIn
                            </a>

                        </div>

                    </section>

                    <!-- ABOUT -->

                    <section class="portfolio-section">

                        <h3>About Me</h3>

                        <p id="previewAbout2"></p>

                    </section>

                    <!-- SKILLS -->

                    <section class="portfolio-section">

                        <h3>Skills</h3>

                        <div id="skillsContainer"></div>

                    </section>

                    <!-- PROJECTS -->

                    <section class="portfolio-section">

                        <h3>Projects</h3>

                        <div id="projectContainer"></div>

                    </section>

                    <!-- EXPERIENCE -->

                    <section class="portfolio-section">

                        <h3>Experience</h3>

                        <div id="experienceContainer"></div>

                    </section>

                    <!-- EDUCATION -->

                    <section class="portfolio-section">

                        <h3>Education</h3>

                        <div id="educationContainer"></div>

                    </section>

                    <!-- CONTACT -->

                <section class="portfolio-section text-center">

                    <h3>Contact</h3>

                    <p id="previewEmail"></p>

                    <p id="previewPhone"></p>

                    <p id="previewLocation"></p>

                </section>

                </div>

            </div>

                </div>


                <!-- Custom Toast -->
                <div id="customToast">
                    Portfolio Saved Successfully
                </div>
                <style>

                #customToast{

                    position:fixed;

                    top:80px;

                    left:50%;

                    transform:translateX(-50%);

                    background:#198754;

                    color:white;

                    padding:12px 25px;

                    border-radius:8px;

                    font-weight:600;

                    z-index:999999;

                    display:none;

                }

                </style>
                 </div>
                    
                <script>

                    let portfolioId =
                        document.getElementById("portfolioId")?.value || null;


                    let state = {

                        hero:{},
                        skills:[],
                        contact:{},
                        project:{},
                        experience:{},
                        education:{}

                    };


                    // ======================
                    // TOAST
                    // ======================

                    function showToast(message, success=true){

                        console.log("SHOW TOAST:", message);


                        const toast = document.getElementById("customToast");


                        if(!toast){
                            console.log("Toast missing");
                            return;
                        }


                        toast.innerText = message;


                        toast.style.backgroundColor =
                            success ? "#198754" : "#dc3545";


                        toast.style.display="block";


                        setTimeout(()=>{

                            toast.style.display="none";

                        },3000);

                    }



                    // ======================
                    // COLLECT DATA
                    // ======================

                    function collect(){


                        state.hero={

                            name:
                            document.getElementById("fullName").value,

                            title:
                            document.getElementById("title").value,

                            bio:
                            document.getElementById("about").value

                        };



                        state.skills =
                        document.getElementById("skills")
                        .value
                        .split(",")
                        .map(x=>x.trim())
                        .filter(Boolean);



                        state.contact={


                            email:
                            document.getElementById("email").value,


                            github:
                            document.getElementById("githubInput").value,


                            linkedin:
                            document.getElementById("linkedinInput").value,


                            phone:
                            document.getElementById("phone").value,


                            location:
                            document.getElementById("location").value

                        };



                        state.project={

                            title:
                            document.getElementById("projectTitle").value,


                            description:
                            document.getElementById("projectDescription").value

                        };



                        state.experience={

                            title:
                            document.getElementById("experienceTitle").value,


                            description:
                            document.getElementById("experienceDescription").value

                        };



                        state.education={


                            degree:
                            document.getElementById("degree").value,


                            college:
                            document.getElementById("college").value

                        };


                    }



                    // ======================
                    // RENDER
                    // ======================

                    function render(){


                    document.getElementById("previewName").innerText =
                    state.hero.name || "";


                    document.getElementById("previewTitle").innerText =
                    state.hero.title || "";


                    document.getElementById("previewAbout").innerText =
                    state.hero.bio || "";


                    document.getElementById("previewAbout2").innerText =
                    state.hero.bio || "";



                    document.getElementById("previewEmail").innerText =
                    state.contact.email || "";


                    document.getElementById("previewPhone").innerText =
                    state.contact.phone || "";


                    document.getElementById("previewLocation").innerText =
                    state.contact.location || "";



                    document.getElementById("skillsContainer").innerHTML =

                    state.skills.map(skill=>`

                    <span class="skill-tag">

                    ${skill}

                    </span>

                    `).join("");



                    document.getElementById("projectContainer").innerHTML=`

                    <div class="project-card">

                    <h5>
                    ${state.project.title || ""}
                    </h5>


                    <p>
                    ${state.project.description || ""}
                    </p>


                    </div>

                    `;



                    document.getElementById("experienceContainer").innerHTML=`

                    <div class="project-card">

                    <h5>
                    ${state.experience.title || ""}
                    </h5>


                    <p>
                    ${state.experience.description || ""}
                    </p>


                    </div>

                    `;



                    document.getElementById("educationContainer").innerHTML=`

                    <div class="project-card">

                    <h5>
                    ${state.education.degree || ""}
                    </h5>


                    <p>
                    ${state.education.college || ""}
                    </p>


                    </div>

                    `;



                    }



                    // ======================
                    // LIVE PREVIEW
                    // ======================

                    document
                    .querySelectorAll("input,textarea")
                    .forEach(el=>{


                    el.addEventListener("input",()=>{


                    collect();

                    render();


                    });


                    });




                    // ======================
                    // SAVE BUTTON
                    // ======================

                    document.addEventListener("DOMContentLoaded", function(){


                        const saveBtn =
                        document.getElementById("savePortfolioBtn");


                        if(!saveBtn){

                            console.log("Save button missing");

                            return;

                        }



                        saveBtn.onclick = async function(){


                            collect();



                            let response =
                            await fetch(
                                `/portfolio/update/${portfolioId}`,
                                {

                                    method:"POST",

                                    headers:{

                                        "Content-Type":"application/json"

                                    },

                                    body:JSON.stringify(state)

                                }

                            );



                            let data =
                            await response.json();



                            console.log(data);



                            const toast =
                            document.getElementById("customToast");



                            toast.innerHTML =
                            "Portfolio Saved Successfully";



                            toast.style.display="block";



                            toast.style.background="#198754";



                            setTimeout(()=>{

                                toast.style.display="none";

                            },3000);



                        };


                    });

                    // ======================
                    // EXPORT PDF
                    // ======================


                    document
                    .getElementById("exportPortfolioBtn")
                    .addEventListener("click",()=>{


                    if(!portfolioId){


                    showToast(

                    "Save Portfolio First",

                    false

                    );


                    return;

                    }


                    window.location.href =

                    `/portfolio/export/${portfolioId}`;


                    });




                    // ======================
                    // LOAD
                    // ======================


                    window.onload=()=>{


                    collect();

                    render();


                    };


                    </script>
{% endblock %}
