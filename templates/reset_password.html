{% extends "base.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-md-6">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        Reset Password
                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                New Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                id="password"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <input
                                type="password"
                                id="confirmPassword"
                                class="form-control"
                                required>

                            <small
                                id="passwordMatch">
                            </small>

                        </div>

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-success">

                                Update Password

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>

<script>

document
.getElementById("confirmPassword")
.addEventListener("keyup", function(){

    validatePasswordMatch();

});

</script>

{% endblock %}
