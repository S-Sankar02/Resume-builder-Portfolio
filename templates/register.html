{% extends "base.html" %}

{% block title %}
Register - AI Resume Builder
{% endblock %}


{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-lg-6 col-md-8 col-sm-10">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">


                    <div class="text-center mb-4">

                        <h2 class="fw-bold">
                            Create Your Account
                        </h2>

                        <p class="text-muted">
                            Join AI Resume Builder today
                        </p>

                    </div>



                    <form method="POST" id="registerForm">


                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                            type="text"
                            class="form-control form-control-lg"
                            name="name"
                            placeholder="Enter Full Name"
                            required>

                        </div>



                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input
                            type="email"
                            class="form-control form-control-lg"
                            name="email"
                            placeholder="Enter Email Address"
                            required>

                        </div>




                        <div class="mb-3">


                            <label class="form-label">
                                Password
                            </label>


                            <div class="input-group">


                                <input
                                type="password"
                                class="form-control form-control-lg"
                                id="password"
                                name="password"
                                placeholder="Create Password"
                                onkeyup="passwordStrength()"
                                required>


                                <button
                                type="button"
                                class="btn btn-outline-secondary"
                                onclick="togglePassword()">


                                    <i class="bi bi-eye"></i>


                                </button>


                            </div>



                            <div class="mt-2">


                                <div class="progress">


                                    <div
                                    id="strengthBar"
                                    class="progress-bar"
                                    style="width:0%">
                                    </div>


                                </div>


                                <small id="strengthText"
                                class="text-muted">

                                Password Strength

                                </small>


                           </div>

                        </div>
                        <div class="mb-3">


                            <label class="form-label">
                                Confirm Password
                            </label>


                            <input
                            type="password"
                            class="form-control form-control-lg"
                            id="confirmPassword"
                            name="confirm_password"
                            placeholder="Confirm Password"
                            required>

                        </div>
                        <div class="form-check mb-4">
                           <input
                            class="form-check-input"
                            type="checkbox"
                            required>


                            <label class="form-check-label">

                                I agree to the
                                Terms & Conditions
                                and Privacy Policy

                            </label>

                        </div>
                        <div class="d-grid">
                            <button
                            type="submit"
                            class="btn btn-success btn-lg">


                                Create Account


                            </button>

                        </div>
                    </form>
                    <hr class="my-4">
                    <div class="text-center">

                        <p>
                            Already have an account?
                        </p>
                        <a href="/login"
                        class="btn btn-outline-primary">

                            Login Here

                        </a>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>
<!-- PASSWORD TOAST -->

<div class="position-fixed top-0 start-50 translate-middle-x p-3"
style="z-index:99999">

    <div id="passwordToast"
    class="toast border-0">
        <div class="toast-body bg-danger text-white rounded">

            <i class="bi bi-exclamation-triangle"></i>
            Passwords do not match
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document
.getElementById("registerForm")
.addEventListener("submit", function(e){

    let password =
    document.getElementById("password").value;
    let confirmPassword =
    document.getElementById("confirmPassword").value;
    if(password !== confirmPassword){

        e.preventDefault();
        let toast =
        new bootstrap.Toast(
            document.getElementById("passwordToast"),
            {
                delay:3000
            }
        );



        toast.show();



    }



});



</script>


{% endblock %}
