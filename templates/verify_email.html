{% extends "base.html" %}

{% block title %}
Email Verification
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-md-6">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5 text-center">

                    <i class="bi bi-envelope-check-fill display-1 text-success"></i>

                    <h2 class="mt-3">
                        Verify Your Email
                    </h2>

                    <p class="text-muted">

                        A verification email has been sent to your inbox.

                    </p>

                    <p>

                        Please click the verification link before logging in.

                    </p>

                    <a
                        href="/login"
                        class="btn btn-primary">

                        Go To Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
