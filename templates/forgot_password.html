{% extends "base.html" %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}

<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-md-6">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <h2 class="text-center mb-3">
                        Forgot Password
                    </h2>

                    <p class="text-center text-muted">
                        Enter your email to receive a password reset link.
                    </p>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-primary">

                                Send Reset Link

                            </button>

                        </div>

                    </form>

                    <div class="text-center mt-4">

                        <a href="/login">
                            Back to Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
